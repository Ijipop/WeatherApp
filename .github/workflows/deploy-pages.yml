# Déploie le build Vite (dossier dist) sur GitHub Pages.
#
# OBLIGATOIRE avant le 1er déploiement (sinon erreur 404 sur deploy) :
#   1. https://github.com/<user>/<repo>/settings/pages
#   2. Build and deployment → Source : « GitHub Actions » (pas « Deploy from a branch »)
#   3. Settings → Actions → General → Workflow permissions : « Read and write permissions »
#      (pour que GITHUB_TOKEN puisse publier sur Pages)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Requis par actions/deploy-pages (sinon erreur 400 « Missing environment »)
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
